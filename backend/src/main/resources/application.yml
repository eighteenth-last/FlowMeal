server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: flowmeal-backend

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/flowmeal?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: qwer4321

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Spring Cache（使用 Redis）
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5分钟，毫秒

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id       # 使用雪花算法生成 ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 2592000        # 30天
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# 支付宝沙箱配置
alipay:
  app-id: "9021000161684485"
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  private-key: ""
  alipay-public-key: ""
  notify-url: http://127.0.0.1:8080/api/payment/alipay/notify
  return-url: http://127.0.0.1:8080/api/payment/alipay/return

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# 日志配置
logging:
  level:
    com.flowmeal: debug
    org.springframework.web: info
